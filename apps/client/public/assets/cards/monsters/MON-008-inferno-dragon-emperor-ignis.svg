<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E07A3A"/><stop offset="50%" stop-color="#C45C1E"/><stop offset="100%" stop-color="#8E3A0E"/>
    </linearGradient>
    <linearGradient id="innerFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F09050"/><stop offset="100%" stop-color="#B04E14"/>
    </linearGradient>
    <linearGradient id="artBg" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#FF4500"/><stop offset="50%" stop-color="#4A1A00"/><stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <linearGradient id="textBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/><stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <linearGradient id="lavaScale" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C0000"/><stop offset="50%" stop-color="#4A0000"/><stop offset="100%" stop-color="#2C0000"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="420" height="610" rx="12" fill="url(#cardFrame)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" fill="none" stroke="url(#innerFrame)" stroke-width="2"/>
  <rect x="20" y="14" width="380" height="40" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC',sans-serif" font-weight="bold" font-size="16" fill="#FFF" stroke="#000" stroke-width="0.8" paint-order="stroke">煉獄龍皇·伊格尼斯</text>
  <!-- Attribute: Fire -->
  <circle cx="378" cy="34" r="18" fill="#8B1A1A" stroke="#5C0A0A" stroke-width="2"/>
  <path d="M378,22 C378,22 384,30 384,34 C384,37.3 381.3,40 378,40 C374.7,40 372,37.3 372,34 C372,30 378,22 378,22Z" fill="#FF4500"/>
  <path d="M378,28 C378,28 382,33 382,35 C382,37.2 380.2,39 378,39 C375.8,39 374,37.2 374,35 C374,33 378,28 378,28Z" fill="#FFD700"/>
  <!-- Stars: 10 -->
  <g transform="translate(396,60)">
    <polygon points="-8,-8 -5.5,-3 0,-2.5 -4,1 -3,6.5 -8,4 -13,6.5 -12,1 -16,-2.5 -10.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-26,-8 -23.5,-3 -18,-2.5 -22,1 -21,6.5 -26,4 -31,6.5 -30,1 -34,-2.5 -28.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-44,-8 -41.5,-3 -36,-2.5 -40,1 -39,6.5 -44,4 -49,6.5 -48,1 -52,-2.5 -46.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-62,-8 -59.5,-3 -54,-2.5 -58,1 -57,6.5 -62,4 -67,6.5 -66,1 -70,-2.5 -64.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-80,-8 -77.5,-3 -72,-2.5 -76,1 -75,6.5 -80,4 -85,6.5 -84,1 -88,-2.5 -82.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-98,-8 -95.5,-3 -90,-2.5 -94,1 -93,6.5 -98,4 -103,6.5 -102,1 -106,-2.5 -100.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-116,-8 -113.5,-3 -108,-2.5 -112,1 -111,6.5 -116,4 -121,6.5 -120,1 -124,-2.5 -118.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-134,-8 -131.5,-3 -126,-2.5 -130,1 -129,6.5 -134,4 -139,6.5 -138,1 -142,-2.5 -136.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-152,-8 -149.5,-3 -144,-2.5 -148,1 -147,6.5 -152,4 -157,6.5 -156,1 -160,-2.5 -154.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-170,-8 -167.5,-3 -162,-2.5 -166,1 -165,6.5 -170,4 -175,6.5 -174,1 -178,-2.5 -172.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  </g>
  <!-- Card art -->
  <rect x="24" y="82" width="372" height="284" rx="2" fill="url(#artBg)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Lava sea at bottom -->
  <path d="M24,320 Q80,310 140,325 Q200,335 260,320 Q330,310 396,330 L396,366 L24,366Z" fill="#FF4500" opacity="0.7"/>
  <path d="M24,335 Q100,325 180,340 Q260,350 396,335 L396,366 L24,366Z" fill="#FF6B35" opacity="0.5"/>
  <!-- Falling rocks/ash -->
  <g fill="#4A4A4A" opacity="0.4">
    <circle cx="80" cy="100" r="2"/><circle cx="320" cy="120" r="3"/><circle cx="150" cy="140" r="1.5"/>
    <circle cx="280" cy="95" r="2"/><circle cx="60" cy="160" r="1"/>
  </g>
  <!-- Dragon figure (rising from lava, massive) -->
  <g transform="translate(210,200)">
    <!-- Fire wings (flame membrane, not solid) -->
    <g filter="url(#glow)">
      <path d="M-30,-30 L-140,-100 L-110,-40 L-160,-70 L-100,-10 L-150,-20 L-70,10Z" fill="#FF4500" opacity="0.7" stroke="#FF6B35" stroke-width="0.5"/>
      <path d="M-40,-20 L-120,-80 L-95,-30 L-130,-50 L-80,0Z" fill="#FF6B35" opacity="0.5"/>
      <path d="M30,-30 L140,-100 L110,-40 L160,-70 L100,-10 L150,-20 L70,10Z" fill="#FF4500" opacity="0.7" stroke="#FF6B35" stroke-width="0.5"/>
      <path d="M40,-20 L120,-80 L95,-30 L130,-50 L80,0Z" fill="#FF6B35" opacity="0.5"/>
    </g>
    <!-- Body (massive, dark red armored scales) -->
    <ellipse cx="0" cy="30" rx="55" ry="50" fill="url(#lavaScale)" stroke="#4A0000" stroke-width="1.5"/>
    <!-- Lava seam glow lines on body -->
    <g stroke="#FF4500" stroke-width="1" opacity="0.6" fill="none">
      <path d="M-30,10 Q-20,20 -30,30"/><path d="M30,10 Q20,20 30,30"/>
      <path d="M-15,40 Q0,50 15,40"/><path d="M-40,25 Q-35,35 -40,45"/>
      <path d="M40,25 Q35,35 40,45"/>
    </g>
    <!-- Dragon core gem (chest) -->
    <ellipse cx="0" cy="15" rx="12" ry="15" fill="#FF0000" stroke="#FF4500" stroke-width="2" filter="url(#bigGlow)"/>
    <ellipse cx="-3" cy="10" rx="4" ry="6" fill="#FF6B35" opacity="0.5"/>
    <!-- Neck -->
    <path d="M-18,-20 Q-15,-50 0,-60 Q15,-50 18,-20" fill="url(#lavaScale)" stroke="#4A0000" stroke-width="1"/>
    <!-- Head (massive jaws) -->
    <path d="M-22,-60 Q-28,-80 -15,-95 Q0,-100 15,-95 Q28,-80 22,-60 Q0,-55 -22,-60Z" fill="url(#lavaScale)" stroke="#4A0000" stroke-width="1.5"/>
    <!-- Open jaw with blue-white breath -->
    <path d="M-15,-65 Q0,-58 15,-65 Q10,-55 0,-52 Q-10,-55 -15,-65Z" fill="#1A0A00"/>
    <!-- Blue-white ultra-hot breath -->
    <g filter="url(#glow)">
      <path d="M0,-58 Q-15,-45 -25,-30 Q-10,-35 0,-25 Q10,-35 25,-30 Q15,-45 0,-58Z" fill="#E0F0FF" opacity="0.6"/>
      <path d="M0,-55 Q-8,-45 -12,-35 Q0,-40 12,-35 Q8,-45 0,-55Z" fill="#FFF" opacity="0.4"/>
    </g>
    <!-- Eyes (fierce, glowing) -->
    <ellipse cx="-10" cy="-80" rx="5" ry="4" fill="#FF0000" filter="url(#glow)"/>
    <ellipse cx="10" cy="-80" rx="5" ry="4" fill="#FF0000" filter="url(#glow)"/>
    <ellipse cx="-10" cy="-80" rx="2" ry="3" fill="#FFD93D"/>
    <ellipse cx="10" cy="-80" rx="2" ry="3" fill="#FFD93D"/>
    <!-- 6 horns (curving back, blue-white flame tips) -->
    <g stroke="#4A4A4A" stroke-width="1" fill="#2C2C2C">
      <path d="M-15,-90 Q-25,-110 -20,-120"/><path d="M-8,-95 Q-15,-118 -10,-128"/>
      <path d="M0,-97 Q0,-120 5,-130"/>
      <path d="M15,-90 Q25,-110 20,-120"/><path d="M8,-95 Q15,-118 10,-128"/>
    </g>
    <g fill="#E0F0FF" filter="url(#glow)" opacity="0.8">
      <circle cx="-20" cy="-120" r="3"/><circle cx="-10" cy="-128" r="2.5"/>
      <circle cx="5" cy="-130" r="2.5"/><circle cx="20" cy="-120" r="3"/>
      <circle cx="10" cy="-128" r="2.5"/>
    </g>
    <!-- Front claws emerging from lava -->
    <path d="M-45,55 L-55,70 L-48,68 L-52,78 L-42,72 L-44,82 L-35,65Z" fill="#2C0000" stroke="#4A0000" stroke-width="1"/>
    <path d="M45,55 L55,70 L48,68 L52,78 L42,72 L44,82 L35,65Z" fill="#2C0000" stroke="#4A0000" stroke-width="1"/>
    <!-- Tail (lava hammer, trailing fire) -->
    <path d="M40,50 Q70,60 90,45 Q100,40 95,50 Q110,55 100,65" fill="url(#lavaScale)" stroke="#4A0000" stroke-width="1"/>
    <circle cx="100" cy="60" r="10" fill="#4A0000" stroke="#FF4500" stroke-width="1.5"/>
    <circle cx="100" cy="60" r="5" fill="#FF4500" opacity="0.5"/>
  </g>
  <!-- Type line -->
  <rect x="24" y="370" width="372" height="24" rx="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#1A1A1A">【龍族／效果】</text>
  <rect x="24" y="398" width="372" height="144" rx="4" fill="url(#textBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC',sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">此卡不能通常召喚。必須從手牌或墓地</tspan>
    <tspan x="32" dy="17">除外3隻火屬性怪獸才能特殊召喚。</tspan>
    <tspan x="32" dy="17">①：此卡召喚成功時，破壞對方場上所有</tspan>
    <tspan x="32" dy="17">怪獸，每破壞1隻給予對方500點傷害。</tspan>
    <tspan x="32" dy="17">②：此卡不會被戰鬥破壞。</tspan>
  </text>
  <text x="28" y="562" font-family="'Roboto Mono',monospace" font-size="10" fill="#888">MON-008</text>
  <text x="388" y="562" font-family="'Roboto',sans-serif" font-weight="bold" font-size="16" fill="#1A1A1A" text-anchor="end">ATK/3500 DEF/3000</text>
  <text x="28" y="592" font-family="'Roboto',sans-serif" font-size="10" fill="#888">UR</text>
</svg>