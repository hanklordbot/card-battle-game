<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C96A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <linearGradient id="innerFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D878"/>
      <stop offset="100%" stop-color="#C49A38"/>
    </linearGradient>
    <linearGradient id="artBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#FFD93D"/>
    </linearGradient>
    <linearGradient id="textBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/>
      <stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <radialGradient id="fireGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#FFD93D" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Card frame -->
  <rect x="0" y="0" width="420" height="610" rx="12" ry="12" fill="url(#cardFrame)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" ry="6" fill="none" stroke="url(#innerFrame)" stroke-width="2"/>
  <!-- Card name -->
  <rect x="20" y="14" width="380" height="40" rx="4" ry="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC',sans-serif" font-weight="bold" font-size="20" fill="#FFF" stroke="#000" stroke-width="0.8" paint-order="stroke">火鱗幼龍</text>
  <!-- Attribute: Fire -->
  <circle cx="378" cy="34" r="18" fill="#8B1A1A" stroke="#5C0A0A" stroke-width="2"/>
  <path d="M378,22 C378,22 384,30 384,34 C384,37.3 381.3,40 378,40 C374.7,40 372,37.3 372,34 C372,30 378,22 378,22Z" fill="#FF4500"/>
  <path d="M378,28 C378,28 382,33 382,35 C382,37.2 380.2,39 378,39 C375.8,39 374,37.2 374,35 C374,33 378,28 378,28Z" fill="#FFD700"/>
  <!-- Stars: 4 -->
  <g transform="translate(396,60)">
    <polygon points="-8,-8 -5.5,-3 0,-2.5 -4,1 -3,6.5 -8,4 -13,6.5 -12,1 -16,-2.5 -10.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-26,-8 -23.5,-3 -18,-2.5 -22,1 -21,6.5 -26,4 -31,6.5 -30,1 -34,-2.5 -28.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-44,-8 -41.5,-3 -36,-2.5 -40,1 -39,6.5 -44,4 -49,6.5 -48,1 -52,-2.5 -46.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-62,-8 -59.5,-3 -54,-2.5 -58,1 -57,6.5 -62,4 -67,6.5 -66,1 -70,-2.5 -64.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  </g>
  <!-- Card art area -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="url(#artBg)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Fire glow background -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="url(#fireGlow)"/>
  <!-- Dragon body -->
  <g transform="translate(210,220)">
    <!-- Tail -->
    <path d="M30,60 Q60,40 70,60 Q75,70 65,65" fill="#FF4500" stroke="#CC3300" stroke-width="1.5"/>
    <circle cx="68" cy="62" r="4" fill="#FFD93D" opacity="0.8"/>
    <!-- Body -->
    <ellipse cx="0" cy="30" rx="45" ry="35" fill="#FF4500" stroke="#CC3300" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="0" cy="38" rx="30" ry="22" fill="#F5DEB3"/>
    <!-- Left wing -->
    <path d="M-35,10 L-80,-30 L-65,0 L-90,-15 L-55,15 Z" fill="#FF6B35" stroke="#CC3300" stroke-width="1" opacity="0.85"/>
    <!-- Right wing -->
    <path d="M35,10 L80,-30 L65,0 L90,-15 L55,15 Z" fill="#FF6B35" stroke="#CC3300" stroke-width="1" opacity="0.85"/>
    <!-- Head -->
    <ellipse cx="0" cy="-15" rx="28" ry="24" fill="#FF4500" stroke="#CC3300" stroke-width="1.5"/>
    <!-- Snout -->
    <ellipse cx="0" cy="-2" rx="16" ry="10" fill="#E03E00"/>
    <!-- Eyes -->
    <ellipse cx="-12" cy="-22" rx="7" ry="6" fill="#FFF8DC"/>
    <circle cx="-11" cy="-22" r="3.5" fill="#1A1A2E"/>
    <circle cx="-10" cy="-23" r="1.2" fill="#FFF"/>
    <ellipse cx="12" cy="-22" rx="7" ry="6" fill="#FFF8DC"/>
    <circle cx="13" cy="-22" r="3.5" fill="#1A1A2E"/>
    <circle cx="14" cy="-23" r="1.2" fill="#FFF"/>
    <!-- Horns (small, rounded) -->
    <path d="M-14,-36 Q-16,-48 -10,-42" fill="#808080" stroke="#666" stroke-width="1"/>
    <path d="M14,-36 Q16,-48 10,-42" fill="#808080" stroke="#666" stroke-width="1"/>
    <!-- Nostrils -->
    <circle cx="-5" cy="-2" r="2" fill="#CC3300"/>
    <circle cx="5" cy="-2" r="2" fill="#CC3300"/>
    <!-- Small fire breath -->
    <path d="M0,-5 Q-8,-12 -3,-18 Q0,-14 3,-18 Q8,-12 0,-5Z" fill="#FFD93D" opacity="0.9"/>
    <path d="M0,-8 Q-4,-13 -1,-16 Q0,-13 1,-16 Q4,-13 0,-8Z" fill="#FFF8DC" opacity="0.7"/>
    <!-- Front legs -->
    <path d="M-25,50 L-30,75 L-22,75 L-18,50" fill="#FF4500" stroke="#CC3300" stroke-width="1"/>
    <path d="M25,50 L30,75 L22,75 L18,50" fill="#FF4500" stroke="#CC3300" stroke-width="1"/>
    <!-- Claws -->
    <path d="M-30,75 L-33,80 M-26,75 L-26,81 M-22,75 L-19,80" stroke="#808080" stroke-width="1.5" fill="none"/>
    <path d="M30,75 L33,80 M26,75 L26,81 M22,75 L19,80" stroke="#808080" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Rock under dragon -->
  <path d="M140,310 Q160,290 200,295 Q240,285 270,310 Q280,320 260,325 Q200,330 150,325 Z" fill="#808080" stroke="#666" stroke-width="1"/>
  <!-- Type line -->
  <rect x="24" y="370" width="372" height="24" rx="2" ry="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#1A1A1A">【龍族】</text>
  <!-- Flavor text -->
  <rect x="24" y="398" width="372" height="144" rx="4" ry="4" fill="url(#textBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC',sans-serif" font-size="12" fill="#3A3A3A" font-style="italic">
    <tspan x="32" y="420">剛從火山巢穴中孵化的幼龍，雖然體型</tspan>
    <tspan x="32" dy="17">嬌小，但與生俱來的烈焰之血讓牠的鱗</tspan>
    <tspan x="32" dy="17">片始終散發著灼熱的光芒。尾巴末端那</tspan>
    <tspan x="32" dy="17">簇不滅的小火焰，是龍族血統的驕傲象</tspan>
    <tspan x="32" dy="17">徵。</tspan>
  </text>
  <!-- Card ID -->
  <text x="28" y="562" font-family="'Roboto Mono',monospace" font-size="10" fill="#888">MON-001</text>
  <!-- ATK/DEF -->
  <text x="388" y="562" font-family="'Roboto',sans-serif" font-weight="bold" font-size="16" fill="#1A1A1A" text-anchor="end">ATK/1500 DEF/1200</text>
  <!-- Rarity -->
  <text x="28" y="592" font-family="'Roboto',sans-serif" font-size="10" fill="#888">N</text>
</svg>