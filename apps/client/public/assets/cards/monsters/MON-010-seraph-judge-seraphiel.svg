<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E07A3A"/><stop offset="50%" stop-color="#C45C1E"/><stop offset="100%" stop-color="#8E3A0E"/>
    </linearGradient>
    <linearGradient id="innerFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F09050"/><stop offset="100%" stop-color="#B04E14"/>
    </linearGradient>
    <radialGradient id="artBg" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFF8E7"/><stop offset="40%" stop-color="#4A6090"/><stop offset="100%" stop-color="#0D1B3E"/>
    </radialGradient>
    <linearGradient id="textBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/><stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <linearGradient id="holyArmor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFF0"/><stop offset="50%" stop-color="#F5F0E8"/><stop offset="100%" stop-color="#E0D8C0"/>
    </linearGradient>
    <linearGradient id="lightSword" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFF0"/><stop offset="100%" stop-color="#FFA000"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="bigGlow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="420" height="610" rx="12" fill="url(#cardFrame)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" fill="none" stroke="url(#innerFrame)" stroke-width="2"/>
  <rect x="20" y="14" width="380" height="40" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="39" font-family="'Noto Sans TC',sans-serif" font-weight="bold" font-size="16" fill="#FFF" stroke="#000" stroke-width="0.8" paint-order="stroke">熾天審判者·賽拉菲爾</text>
  <!-- Attribute: Light -->
  <circle cx="378" cy="34" r="18" fill="#FFF8DC" stroke="#DAA520" stroke-width="2"/>
  <circle cx="378" cy="34" r="6" fill="#FFD700"/>
  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round">
    <line x1="378" y1="20" x2="378" y2="24"/><line x1="378" y1="44" x2="378" y2="48"/>
    <line x1="364" y1="34" x2="368" y2="34"/><line x1="388" y1="34" x2="392" y2="34"/>
    <line x1="369" y1="25" x2="372" y2="28"/><line x1="387" y1="25" x2="384" y2="28"/>
    <line x1="369" y1="43" x2="372" y2="40"/><line x1="387" y1="43" x2="384" y2="40"/>
  </g>
  <!-- Stars: 9 -->
  <g transform="translate(396,60)">
    <polygon points="-8,-8 -5.5,-3 0,-2.5 -4,1 -3,6.5 -8,4 -13,6.5 -12,1 -16,-2.5 -10.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-26,-8 -23.5,-3 -18,-2.5 -22,1 -21,6.5 -26,4 -31,6.5 -30,1 -34,-2.5 -28.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-44,-8 -41.5,-3 -36,-2.5 -40,1 -39,6.5 -44,4 -49,6.5 -48,1 -52,-2.5 -46.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-62,-8 -59.5,-3 -54,-2.5 -58,1 -57,6.5 -62,4 -67,6.5 -66,1 -70,-2.5 -64.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-80,-8 -77.5,-3 -72,-2.5 -76,1 -75,6.5 -80,4 -85,6.5 -84,1 -88,-2.5 -82.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-98,-8 -95.5,-3 -90,-2.5 -94,1 -93,6.5 -98,4 -103,6.5 -102,1 -106,-2.5 -100.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-116,-8 -113.5,-3 -108,-2.5 -112,1 -111,6.5 -116,4 -121,6.5 -120,1 -124,-2.5 -118.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-134,-8 -131.5,-3 -126,-2.5 -130,1 -129,6.5 -134,4 -139,6.5 -138,1 -142,-2.5 -136.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-152,-8 -149.5,-3 -144,-2.5 -148,1 -147,6.5 -152,4 -157,6.5 -156,1 -160,-2.5 -154.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  </g>
  <!-- Card art -->
  <rect x="24" y="82" width="372" height="284" rx="2" fill="url(#artBg)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Holy light pillar behind -->
  <rect x="185" y="82" width="50" height="284" fill="#FFF8E7" opacity="0.15"/>
  <rect x="195" y="82" width="30" height="284" fill="#FFD700" opacity="0.1"/>
  <!-- Cloud tear effect -->
  <g opacity="0.4">
    <path d="M24,300 Q80,280 140,310 Q180,320 210,300 Q250,280 300,310 Q350,320 396,290" fill="#0D1B3E"/>
    <path d="M24,320 Q100,300 180,330 Q250,340 396,310 L396,366 L24,366Z" fill="#0D1B3E" opacity="0.6"/>
  </g>
  <!-- Golden light dust cascade -->
  <g fill="#FFD700" opacity="0.4">
    <circle cx="100" cy="120" r="1.5"/><circle cx="300" cy="100" r="1.2"/><circle cx="160" cy="150" r="1"/>
    <circle cx="260" cy="130" r="1.3"/><circle cx="130" cy="200" r="1.5"/><circle cx="290" cy="220" r="1"/>
    <circle cx="180" cy="280" r="1.2"/><circle cx="240" cy="300" r="1"/><circle cx="80" cy="250" r="0.8"/>
    <circle cx="340" cy="180" r="1.3"/><circle cx="70" cy="160" r="1"/><circle cx="350" cy="280" r="1.5"/>
  </g>
  <!-- Seraphim figure (symmetrical, divine) -->
  <g transform="translate(210,200)">
    <!-- Six wings -->
    <!-- Top pair: energy geometric wings -->
    <g filter="url(#glow)" opacity="0.6">
      <path d="M-10,-55 L-60,-110 L-45,-70 L-80,-95 L-40,-50Z" fill="#4FC3F7"/>
      <path d="M10,-55 L60,-110 L45,-70 L80,-95 L40,-50Z" fill="#4FC3F7"/>
    </g>
    <!-- Middle pair: massive white feather wings -->
    <g fill="#F5F0E8" stroke="#E0D8C0" stroke-width="0.5">
      <path d="M-18,-20 L-80,-50 L-65,-15 L-110,-25 L-85,5 L-130,0 L-95,25 L-140,30 L-80,40 L-120,55 L-50,45Z"/>
      <path d="M18,-20 L80,-50 L65,-15 L110,-25 L85,5 L130,0 L95,25 L140,30 L80,40 L120,55 L50,45Z"/>
    </g>
    <!-- Wing glow -->
    <g fill="#FFD700" opacity="0.08">
      <path d="M-18,-20 L-80,-50 L-65,-15 L-110,-25 L-85,5 L-130,0 L-95,25 L-140,30 L-80,40 L-120,55 L-50,45Z"/>
      <path d="M18,-20 L80,-50 L65,-15 L110,-25 L85,5 L130,0 L95,25 L140,30 L80,40 L120,55 L50,45Z"/>
    </g>
    <!-- Bottom pair: gold small wings -->
    <g fill="#FFD700" opacity="0.5">
      <path d="M-15,25 L-55,50 L-40,55 L-65,70 L-30,60Z"/>
      <path d="M15,25 L55,50 L40,55 L65,70 L30,60Z"/>
    </g>
    <!-- Flowing robes -->
    <path d="M-18,0 Q-22,40 -18,80 Q0,90 18,80 Q22,40 18,0Z" fill="url(#holyArmor)" stroke="#DAA520" stroke-width="0.8"/>
    <!-- Robe dissolving into light particles at bottom -->
    <g fill="#FFD700" opacity="0.3">
      <circle cx="-10" cy="82" r="2"/><circle cx="5" cy="85" r="1.5"/><circle cx="-5" cy="90" r="1"/>
      <circle cx="10" cy="88" r="1.5"/><circle cx="0" cy="93" r="1"/>
    </g>
    <!-- Light armor plates -->
    <path d="M-16,-5 L-18,30 L18,30 L16,-5 Q0,-10 -16,-5Z" fill="#F5F0E8" stroke="#DAA520" stroke-width="1.5"/>
    <!-- Armor seam holy light -->
    <g stroke="#FFD700" stroke-width="0.5" opacity="0.5">
      <line x1="-16" y1="5" x2="-12" y2="5"/><line x1="16" y1="5" x2="12" y2="5"/>
      <line x1="-16" y1="15" x2="-12" y2="15"/><line x1="16" y1="15" x2="12" y2="15"/>
    </g>
    <!-- Right arm: judgment sword pointing down -->
    <path d="M16,0 L35,-10 L38,-5" fill="url(#holyArmor)" stroke="#DAA520" stroke-width="0.5"/>
    <g transform="translate(36,-8) rotate(160)">
      <rect x="-3" y="0" width="6" height="50" rx="1" fill="url(#lightSword)" filter="url(#glow)"/>
      <rect x="-8" y="-2" width="16" height="4" rx="1" fill="#FFD700"/>
      <path d="M-3,50 L0,58 L3,50" fill="#FFFFF0"/>
      <!-- Sword aura -->
      <rect x="-3" y="0" width="6" height="50" rx="1" fill="#FFD700" opacity="0.15"/>
    </g>
    <!-- Left arm: scales of judgment -->
    <path d="M-16,0 L-35,-10 L-38,-5" fill="url(#holyArmor)" stroke="#DAA520" stroke-width="0.5"/>
    <g transform="translate(-38,-15)">
      <!-- Scale beam -->
      <line x1="-15" y1="0" x2="15" y2="0" stroke="#DAA520" stroke-width="1.5"/>
      <line x1="0" y1="-8" x2="0" y2="0" stroke="#DAA520" stroke-width="1.5"/>
      <!-- Left pan (feather) -->
      <path d="M-18,0 L-20,5 L-12,5 L-10,0" fill="none" stroke="#DAA520" stroke-width="0.8"/>
      <path d="M-16,4 Q-15,2 -14,4" fill="#F5F0E8" stroke="#E0D8C0" stroke-width="0.5"/>
      <!-- Right pan (heart light) -->
      <path d="M10,0 L8,5 L16,5 L18,0" fill="none" stroke="#DAA520" stroke-width="0.8"/>
      <circle cx="13" cy="3" r="2.5" fill="#FFD700" opacity="0.6" filter="url(#glow)"/>
    </g>
    <!-- Head -->
    <ellipse cx="0" cy="-25" rx="12" ry="14" fill="#FFE4C4" stroke="#D4A880" stroke-width="0.8"/>
    <!-- Hair (flowing, silver-gold) -->
    <path d="M-12,-32 Q-16,-48 -10,-55" fill="none" stroke="#F0E68C" stroke-width="2.5"/>
    <path d="M-8,-36 Q-12,-50 -5,-58" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <path d="M12,-32 Q16,-48 10,-55" fill="none" stroke="#F0E68C" stroke-width="2.5"/>
    <path d="M8,-36 Q12,-50 5,-58" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <!-- Eyes (pure gold, no pupils) -->
    <ellipse cx="-4" cy="-26" rx="3" ry="2.5" fill="#FFD700" filter="url(#glow)"/>
    <ellipse cx="4" cy="-26" rx="3" ry="2.5" fill="#FFD700" filter="url(#glow)"/>
    <!-- Stern mouth -->
    <line x1="-3" y1="-18" x2="3" y2="-18" stroke="#C0A080" stroke-width="0.8"/>
    <!-- Triple halo (concentric) -->
    <g filter="url(#glow)">
      <ellipse cx="0" cy="-42" rx="20" ry="6" fill="none" stroke="#FFD700" stroke-width="1.5"/>
      <ellipse cx="0" cy="-42" rx="15" ry="4.5" fill="none" stroke="#FFA000" stroke-width="1"/>
      <ellipse cx="0" cy="-42" rx="10" ry="3" fill="none" stroke="#FFD700" stroke-width="0.8"/>
    </g>
    <!-- Rotating angel text on outer halo -->
    <g fill="#FFD700" font-size="5" opacity="0.5">
      <text x="-20" y="-40">✦</text><text x="-10" y="-46">◆</text><text x="5" y="-46">✧</text><text x="15" y="-40">◇</text>
    </g>
  </g>
  <!-- Type line -->
  <rect x="24" y="370" width="372" height="24" rx="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#1A1A1A">【天使族／效果】</text>
  <rect x="24" y="398" width="372" height="144" rx="4" fill="url(#textBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC',sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">此卡不能通常召喚。必須從手牌將3隻</tspan>
    <tspan x="32" dy="17">光屬性怪獸送入墓地才能特殊召喚。</tspan>
    <tspan x="32" dy="17">①：此卡召喚成功時，對方場上所有表側</tspan>
    <tspan x="32" dy="17">表示怪獸的效果無效化。</tspan>
    <tspan x="32" dy="17">②：一回合一次，可以選擇對方場上1張</tspan>
    <tspan x="32" dy="17">卡片除外。</tspan>
    <tspan x="32" dy="17">③：此卡被破壞時，從墓地特殊召喚1隻</tspan>
    <tspan x="32" dy="17">光屬性怪獸。</tspan>
  </text>
  <text x="28" y="562" font-family="'Roboto Mono',monospace" font-size="10" fill="#888">MON-010</text>
  <text x="388" y="562" font-family="'Roboto',sans-serif" font-weight="bold" font-size="16" fill="#1A1A1A" text-anchor="end">ATK/3200 DEF/2800</text>
  <text x="28" y="592" font-family="'Roboto',sans-serif" font-size="10" fill="#888">UR</text>
</svg>