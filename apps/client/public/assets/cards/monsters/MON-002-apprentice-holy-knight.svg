<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C96A"/><stop offset="50%" stop-color="#D4A843"/><stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <linearGradient id="innerFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F0D878"/><stop offset="100%" stop-color="#C49A38"/>
    </linearGradient>
    <linearGradient id="artBg" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/><stop offset="100%" stop-color="#F0E68C"/>
    </linearGradient>
    <linearGradient id="textBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/><stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <linearGradient id="armorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0E0E0"/><stop offset="100%" stop-color="#A0A0A0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="420" height="610" rx="12" ry="12" fill="url(#cardFrame)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" ry="6" fill="none" stroke="url(#innerFrame)" stroke-width="2"/>
  <!-- Card name -->
  <rect x="20" y="14" width="380" height="40" rx="4" ry="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC',sans-serif" font-weight="bold" font-size="20" fill="#FFF" stroke="#000" stroke-width="0.8" paint-order="stroke">見習聖騎兵</text>
  <!-- Attribute: Light -->
  <circle cx="378" cy="34" r="18" fill="#FFF8DC" stroke="#DAA520" stroke-width="2"/>
  <circle cx="378" cy="34" r="6" fill="#FFD700"/>
  <g stroke="#FFD700" stroke-width="1.5" stroke-linecap="round">
    <line x1="378" y1="20" x2="378" y2="24"/><line x1="378" y1="44" x2="378" y2="48"/>
    <line x1="364" y1="34" x2="368" y2="34"/><line x1="388" y1="34" x2="392" y2="34"/>
    <line x1="369" y1="25" x2="372" y2="28"/><line x1="384" y1="40" x2="387" y2="43"/>
    <line x1="387" y1="25" x2="384" y2="28"/><line x1="369" y1="43" x2="372" y2="40"/>
  </g>
  <!-- Stars: 3 -->
  <g transform="translate(396,60)">
    <polygon points="-8,-8 -5.5,-3 0,-2.5 -4,1 -3,6.5 -8,4 -13,6.5 -12,1 -16,-2.5 -10.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-26,-8 -23.5,-3 -18,-2.5 -22,1 -21,6.5 -26,4 -31,6.5 -30,1 -34,-2.5 -28.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-44,-8 -41.5,-3 -36,-2.5 -40,1 -39,6.5 -44,4 -49,6.5 -48,1 -52,-2.5 -46.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  </g>
  <!-- Card art -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="url(#artBg)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Light dust particles -->
  <circle cx="80" cy="120" r="1.5" fill="#FFD700" opacity="0.5"/>
  <circle cx="320" cy="150" r="1" fill="#FFD700" opacity="0.4"/>
  <circle cx="150" cy="100" r="1.2" fill="#FFD700" opacity="0.6"/>
  <circle cx="280" cy="300" r="1.5" fill="#FFD700" opacity="0.3"/>
  <circle cx="100" cy="280" r="1" fill="#FFD700" opacity="0.5"/>
  <!-- Stone path ground -->
  <path d="M24,340 Q100,320 210,325 Q320,320 396,340 L396,366 L24,366Z" fill="#B0A890" stroke="#8A8070" stroke-width="0.5"/>
  <line x1="120" y1="330" x2="125" y2="360" stroke="#8A8070" stroke-width="0.5"/>
  <line x1="200" y1="326" x2="198" y2="360" stroke="#8A8070" stroke-width="0.5"/>
  <line x1="280" y1="328" x2="285" y2="360" stroke="#8A8070" stroke-width="0.5"/>
  <!-- Knight figure -->
  <g transform="translate(210,200)">
    <!-- Cape -->
    <path d="M-15,-30 L-25,60 Q-20,65 0,62 Q5,60 10,62 L15,60 L5,-30Z" fill="#F5F0E8" stroke="#D0C8B0" stroke-width="1"/>
    <path d="M-15,-30 L-20,60 Q-15,62 -5,60 L0,-30Z" fill="#87CEEB" opacity="0.3"/>
    <!-- Legs -->
    <rect x="-14" y="40" width="10" height="35" rx="3" fill="url(#armorGrad)" stroke="#888" stroke-width="1"/>
    <rect x="4" y="40" width="10" height="35" rx="3" fill="url(#armorGrad)" stroke="#888" stroke-width="1"/>
    <!-- Boots -->
    <path d="M-16,72 L-16,80 L-2,80 L-2,72" fill="#8B6914" stroke="#5C4033" stroke-width="1"/>
    <path d="M2,72 L2,80 L16,80 L16,72" fill="#8B6914" stroke="#5C4033" stroke-width="1"/>
    <!-- Body armor -->
    <path d="M-20,-25 L-22,40 L22,40 L20,-25 Q0,-32 -20,-25Z" fill="url(#armorGrad)" stroke="#888" stroke-width="1.5"/>
    <!-- Chest emblem -->
    <circle cx="0" cy="10" r="8" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="3" fill="#FFD700" opacity="0.6"/>
    <!-- Shoulder pads -->
    <ellipse cx="-24" cy="-20" rx="10" ry="7" fill="#C0C0C0" stroke="#DAA520" stroke-width="1"/>
    <ellipse cx="24" cy="-20" rx="10" ry="7" fill="#C0C0C0" stroke="#DAA520" stroke-width="1"/>
    <!-- Left arm (shield) -->
    <rect x="-38" y="-15" width="8" height="40" rx="3" fill="url(#armorGrad)" stroke="#888" stroke-width="1"/>
    <!-- Shield -->
    <path d="M-55,-10 L-55,25 Q-55,40 -42,45 Q-29,40 -29,25 L-29,-10Z" fill="#C0C0C0" stroke="#DAA520" stroke-width="1.5"/>
    <circle cx="-42" cy="15" r="10" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <!-- Sun emblem on shield -->
    <circle cx="-42" cy="15" r="5" fill="#FFD700"/>
    <g stroke="#FFD700" stroke-width="1" stroke-linecap="round">
      <line x1="-42" y1="6" x2="-42" y2="9"/><line x1="-42" y1="21" x2="-42" y2="24"/>
      <line x1="-51" y1="15" x2="-48" y2="15"/><line x1="-36" y1="15" x2="-33" y2="15"/>
    </g>
    <!-- Right arm (sword) -->
    <rect x="30" y="-15" width="8" height="40" rx="3" fill="url(#armorGrad)" stroke="#888" stroke-width="1"/>
    <!-- Sword -->
    <rect x="35" y="-55" width="4" height="45" rx="1" fill="#D0D0D0" stroke="#AAA" stroke-width="0.5"/>
    <rect x="31" y="-12" width="12" height="4" rx="1" fill="#DAA520"/>
    <path d="M35,-55 L37,-60 L39,-55" fill="#E0E0E0"/>
    <!-- Sword glow -->
    <rect x="35" y="-55" width="4" height="45" rx="1" fill="#FFD700" opacity="0.15"/>
    <!-- Head -->
    <circle cx="0" cy="-42" r="16" fill="#FFE4C4" stroke="#D4A880" stroke-width="1"/>
    <!-- Hair -->
    <path d="M-14,-52 Q-16,-62 -8,-60 Q0,-65 8,-60 Q16,-62 14,-52" fill="#DAA520" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Eyes -->
    <ellipse cx="-6" cy="-44" rx="3" ry="2.5" fill="#FFF"/>
    <circle cx="-5.5" cy="-44" r="1.8" fill="#4682B4"/>
    <circle cx="-5" cy="-44.5" r="0.6" fill="#FFF"/>
    <ellipse cx="6" cy="-44" rx="3" ry="2.5" fill="#FFF"/>
    <circle cx="6.5" cy="-44" r="1.8" fill="#4682B4"/>
    <circle cx="7" cy="-44.5" r="0.6" fill="#FFF"/>
    <!-- Mouth -->
    <path d="M-3,-37 Q0,-35 3,-37" fill="none" stroke="#B08060" stroke-width="0.8"/>
  </g>
  <!-- Type line -->
  <rect x="24" y="370" width="372" height="24" rx="2" ry="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#1A1A1A">【戰士族】</text>
  <!-- Flavor text -->
  <rect x="24" y="398" width="372" height="144" rx="4" ry="4" fill="url(#textBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC',sans-serif" font-size="12" fill="#3A3A3A" font-style="italic">
    <tspan x="32" y="420">立志成為聖騎士的少年，雖然劍術尚未</tspan>
    <tspan x="32" dy="17">純熟，但那面刻有太陽紋章的盾牌，象</tspan>
    <tspan x="32" dy="17">徵著他守護弱者的堅定信念。每天清晨</tspan>
    <tspan x="32" dy="17">的第一道陽光，都會照亮他鎧甲上的誓</tspan>
    <tspan x="32" dy="17">言銘文。</tspan>
  </text>
  <text x="28" y="562" font-family="'Roboto Mono',monospace" font-size="10" fill="#888">MON-002</text>
  <text x="388" y="562" font-family="'Roboto',sans-serif" font-weight="bold" font-size="16" fill="#1A1A1A" text-anchor="end">ATK/1200 DEF/1000</text>
  <text x="28" y="592" font-family="'Roboto',sans-serif" font-size="10" fill="#888">N</text>
</svg>