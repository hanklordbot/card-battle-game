<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C42878"/>
      <stop offset="50%" stop-color="#9B1B5E"/>
      <stop offset="100%" stop-color="#701045"/>
    </linearGradient>
    <linearGradient id="innerFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D83888"/>
      <stop offset="100%" stop-color="#881050"/>
    </linearGradient>
    <linearGradient id="textAreaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/>
      <stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <!-- Art: Soul seal -->
    <radialGradient id="sealGlow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.4"/>
      <stop offset="60%" stop-color="#2D1B4E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0"/>
    </radialGradient>
    <filter id="chainGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soulBlur">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- Card frame -->
  <rect x="0" y="0" width="420" height="610" rx="12" ry="12" fill="url(#cardFrameGrad)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" ry="6" fill="none" stroke="url(#innerFrameGrad)" stroke-width="2"/>

  <!-- Card name -->
  <rect x="20" y="14" width="380" height="40" rx="4" ry="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC', sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" stroke="#000000" stroke-width="0.8" paint-order="stroke">靈魂封印</text>

  <!-- Trap type icon - Continuous -->
  <circle cx="378" cy="34" r="18" fill="#9B1B5E" stroke="#5A0E38" stroke-width="2"/>
  <text x="378" y="30" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">陷阱</text>
  <text x="378" y="42" font-family="sans-serif" font-size="8" fill="#F0A0C8" text-anchor="middle">永續</text>

  <!-- Sub-type indicator -->
  <rect x="24" y="58" width="372" height="20" rx="2" ry="2" fill="rgba(0,0,0,0.1)"/>
  <text x="390" y="72" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#FFD0E8" text-anchor="end">【永續陷阱】</text>

  <!-- Card art area -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="#0D0D1A" stroke="#2A2A2A" stroke-width="2"/>
  <rect x="26" y="84" width="368" height="280" fill="#0D0D1A" rx="1"/>
  <!-- Seal magic circle on ground -->
  <g opacity="0.6">
    <ellipse cx="210" cy="260" rx="120" ry="40" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <ellipse cx="210" cy="260" rx="100" ry="33" fill="none" stroke="#8B5CF6" stroke-width="0.8" opacity="0.6"/>
    <ellipse cx="210" cy="260" rx="80" ry="26" fill="none" stroke="#2D1B4E" stroke-width="0.5" opacity="0.5"/>
    <!-- Seal rune marks on circle -->
    <text x="160" y="258" font-family="serif" font-size="8" fill="#8B5CF6" opacity="0.5">✦</text>
    <text x="200" y="250" font-family="serif" font-size="8" fill="#8B5CF6" opacity="0.5">✦</text>
    <text x="240" y="258" font-family="serif" font-size="8" fill="#8B5CF6" opacity="0.5">✦</text>
    <text x="180" y="270" font-family="serif" font-size="8" fill="#8B5CF6" opacity="0.4">✦</text>
    <text x="220" y="270" font-family="serif" font-size="8" fill="#8B5CF6" opacity="0.4">✦</text>
  </g>
  <!-- Seal glow -->
  <ellipse cx="210" cy="220" rx="100" ry="80" fill="url(#sealGlow)"/>
  <!-- Trapped souls (ghostly wisps) -->
  <g filter="url(#soulBlur)" opacity="0.4">
    <ellipse cx="170" cy="190" rx="20" ry="30" fill="#8B5CF6"/>
    <ellipse cx="250" cy="185" rx="18" ry="28" fill="#8B5CF6"/>
    <ellipse cx="210" cy="175" rx="15" ry="25" fill="#B0BEC5"/>
  </g>
  <!-- Soul wisps (sharper) -->
  <g opacity="0.5">
    <path d="M170,210 Q165,180 170,160 Q175,170 172,190" fill="#8B5CF6" opacity="0.4"/>
    <path d="M250,205 Q245,175 250,155 Q255,165 252,185" fill="#8B5CF6" opacity="0.4"/>
    <path d="M210,200 Q205,165 210,145 Q215,160 212,180" fill="#B0BEC5" opacity="0.3"/>
  </g>
  <!-- Binding chains crossing over seal -->
  <g filter="url(#chainGlow)" opacity="0.7">
    <!-- Chain 1: diagonal -->
    <path d="M100,140 L140,170 L160,160 L190,190 L210,180 L240,200 L270,190 L300,210 L320,200" fill="none" stroke="#8B6914" stroke-width="3" stroke-linecap="round"/>
    <!-- Chain 2: opposite diagonal -->
    <path d="M320,150 L290,175 L260,165 L230,195 L200,185 L170,205 L140,195 L110,215 L100,210" fill="none" stroke="#8B6914" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  </g>
  <!-- Chain link details -->
  <g opacity="0.5">
    <ellipse cx="160" cy="160" rx="4" ry="6" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <ellipse cx="210" cy="180" rx="4" ry="6" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <ellipse cx="270" cy="190" rx="4" ry="6" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <ellipse cx="230" cy="195" rx="4" ry="6" fill="none" stroke="#DAA520" stroke-width="1.5" opacity="0.4"/>
  </g>
  <!-- Lock symbol at center -->
  <g filter="url(#chainGlow)" opacity="0.8">
    <rect x="203" y="215" width="14" height="12" rx="2" fill="#8B6914" stroke="#DAA520" stroke-width="1"/>
    <path d="M206,215 Q206,205 210,202 Q214,205 214,215" fill="none" stroke="#DAA520" stroke-width="1.5"/>
    <circle cx="210" cy="221" r="2" fill="#DAA520"/>
  </g>
  <!-- Dim purple particles -->
  <circle cx="140" cy="170" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="280" cy="175" r="1.5" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="190" cy="140" r="1" fill="#B0BEC5" opacity="0.3"/>
  <circle cx="230" cy="145" r="1" fill="#B0BEC5" opacity="0.3"/>

  <!-- Type description line -->
  <rect x="24" y="370" width="372" height="24" rx="2" ry="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC', sans-serif" font-size="13" fill="#FFD0E8">【永續陷阱】</text>

  <!-- Effect text area -->
  <rect x="24" y="398" width="372" height="172" rx="4" ry="4" fill="url(#textAreaBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">此卡在場上表側表示存在的期間，雙方</tspan>
    <tspan x="32" y="437">不能從墓地特殊召喚怪獸。</tspan>
  </text>

  <!-- Card ID -->
  <text x="28" y="588" font-family="'Roboto Mono', monospace" font-size="10" fill="#888888">TRP-005</text>
  <text x="388" y="588" font-family="'Roboto', sans-serif" font-size="10" fill="#888888" text-anchor="end">R</text>
</svg>
