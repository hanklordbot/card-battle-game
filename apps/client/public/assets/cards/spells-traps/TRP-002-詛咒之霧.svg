<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C42878"/>
      <stop offset="50%" stop-color="#9B1B5E"/>
      <stop offset="100%" stop-color="#701045"/>
    </linearGradient>
    <linearGradient id="innerFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D83888"/>
      <stop offset="100%" stop-color="#881050"/>
    </linearGradient>
    <linearGradient id="textAreaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/>
      <stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <!-- Art: Cursed fog -->
    <radialGradient id="fogCenter" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2D1B4E" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#1B5E20" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#1A1A2E" stop-opacity="0.9"/>
    </radialGradient>
    <filter id="fogBlur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="runeGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card frame -->
  <rect x="0" y="0" width="420" height="610" rx="12" ry="12" fill="url(#cardFrameGrad)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" ry="6" fill="none" stroke="url(#innerFrameGrad)" stroke-width="2"/>

  <!-- Card name -->
  <rect x="20" y="14" width="380" height="40" rx="4" ry="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC', sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" stroke="#000000" stroke-width="0.8" paint-order="stroke">詛咒之霧</text>

  <!-- Trap type icon - Continuous -->
  <circle cx="378" cy="34" r="18" fill="#9B1B5E" stroke="#5A0E38" stroke-width="2"/>
  <text x="378" y="30" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">陷阱</text>
  <text x="378" y="42" font-family="sans-serif" font-size="8" fill="#F0A0C8" text-anchor="middle">永續</text>

  <!-- Sub-type indicator -->
  <rect x="24" y="58" width="372" height="20" rx="2" ry="2" fill="rgba(0,0,0,0.1)"/>
  <text x="390" y="72" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#FFD0E8" text-anchor="end">【永續陷阱】</text>

  <!-- Card art area -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="#1A1A2E" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Dark base -->
  <rect x="26" y="84" width="368" height="280" fill="#1A1A2E" rx="1"/>
  <!-- Fog layers -->
  <g filter="url(#fogBlur)">
    <ellipse cx="150" cy="200" rx="100" ry="60" fill="#2D1B4E" opacity="0.5"/>
    <ellipse cx="280" cy="230" rx="90" ry="50" fill="#1B5E20" opacity="0.3"/>
    <ellipse cx="210" cy="260" rx="120" ry="50" fill="#2D1B4E" opacity="0.4"/>
    <ellipse cx="130" cy="280" rx="80" ry="40" fill="#1B5E20" opacity="0.25"/>
    <ellipse cx="300" cy="170" rx="70" ry="45" fill="#2D1B4E" opacity="0.35"/>
  </g>
  <!-- Fog overlay -->
  <rect x="26" y="84" width="368" height="280" fill="url(#fogCenter)" rx="1"/>
  <!-- Ground cracks emitting fog -->
  <g opacity="0.5">
    <path d="M100,340 Q120,330 140,340 Q160,335 180,345" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
    <path d="M230,335 Q250,325 270,338 Q290,330 310,340" stroke="#1B5E20" stroke-width="1.5" fill="none"/>
  </g>
  <!-- Curse runes floating in fog -->
  <g filter="url(#runeGlow)" opacity="0.7">
    <!-- Rune symbols (simplified geometric) -->
    <polygon points="150,180 155,170 160,180 155,185" fill="none" stroke="#8B5CF6" stroke-width="1"/>
    <polygon points="260,190 265,180 270,190 265,195" fill="none" stroke="#8B5CF6" stroke-width="1"/>
    <polygon points="200,220 205,210 210,220 205,225" fill="none" stroke="#1B5E20" stroke-width="1"/>
    <polygon points="170,260 175,250 180,260 175,265" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
    <polygon points="240,250 245,240 250,250 245,255" fill="none" stroke="#1B5E20" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Ghostly faces in fog -->
  <g opacity="0.15">
    <circle cx="140" cy="210" r="12" fill="none" stroke="#8B5CF6" stroke-width="0.5"/>
    <circle cx="135" cy="207" r="2" fill="#8B5CF6"/>
    <circle cx="145" cy="207" r="2" fill="#8B5CF6"/>
    <path d="M135,215 Q140,218 145,215" stroke="#8B5CF6" stroke-width="0.5" fill="none"/>
  </g>
  <g opacity="0.1">
    <circle cx="280" cy="240" r="14" fill="none" stroke="#1B5E20" stroke-width="0.5"/>
    <circle cx="274" cy="237" r="2" fill="#1B5E20"/>
    <circle cx="286" cy="237" r="2" fill="#1B5E20"/>
    <path d="M274,245 Q280,248 286,245" stroke="#1B5E20" stroke-width="0.5" fill="none"/>
  </g>
  <!-- Toxic green particles -->
  <circle cx="120" cy="190" r="2" fill="#1B5E20" opacity="0.5"/>
  <circle cx="300" cy="200" r="1.5" fill="#1B5E20" opacity="0.4"/>
  <circle cx="180" cy="170" r="1.5" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="250" cy="280" r="2" fill="#1B5E20" opacity="0.3"/>

  <!-- Type description line -->
  <rect x="24" y="370" width="372" height="24" rx="2" ry="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC', sans-serif" font-size="13" fill="#FFD0E8">【永續陷阱】</text>

  <!-- Effect text area -->
  <rect x="24" y="398" width="372" height="172" rx="4" ry="4" fill="url(#textAreaBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">對方場上所有表側表示怪獸的攻擊力，</tspan>
    <tspan x="32" y="437">每次對方的準備階段降低200點。</tspan>
  </text>

  <!-- Card ID -->
  <text x="28" y="588" font-family="'Roboto Mono', monospace" font-size="10" fill="#888888">TRP-002</text>
  <text x="388" y="588" font-family="'Roboto', sans-serif" font-size="10" fill="#888888" text-anchor="end">N</text>
</svg>
