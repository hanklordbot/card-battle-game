<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2AAE68"/>
      <stop offset="50%" stop-color="#1D8A50"/>
      <stop offset="100%" stop-color="#126638"/>
    </linearGradient>
    <linearGradient id="innerFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38C478"/>
      <stop offset="100%" stop-color="#187A44"/>
    </linearGradient>
    <linearGradient id="textAreaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/>
      <stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <!-- Art: Forest barrier -->
    <linearGradient id="forestBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A8E6CF"/>
      <stop offset="50%" stop-color="#2ECC71"/>
      <stop offset="100%" stop-color="#1B5E20"/>
    </linearGradient>
    <radialGradient id="barrierGlow" cx="50%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#A8E6CF" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#2ECC71" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1B5E20" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card frame -->
  <rect x="0" y="0" width="420" height="610" rx="12" ry="12" fill="url(#cardFrameGrad)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" ry="6" fill="none" stroke="url(#innerFrameGrad)" stroke-width="2"/>

  <!-- Card name -->
  <rect x="20" y="14" width="380" height="40" rx="4" ry="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC', sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" stroke="#000000" stroke-width="0.8" paint-order="stroke">生命之森結界</text>

  <!-- Spell type icon - Continuous -->
  <circle cx="378" cy="34" r="18" fill="#1D8A50" stroke="#0E5530" stroke-width="2"/>
  <text x="378" y="30" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">魔法</text>
  <text x="378" y="42" font-family="sans-serif" font-size="8" fill="#A0E0B8" text-anchor="middle">永續</text>

  <!-- Sub-type indicator -->
  <rect x="24" y="58" width="372" height="20" rx="2" ry="2" fill="rgba(0,0,0,0.1)"/>
  <text x="390" y="72" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#E0FFE8" text-anchor="end">【永續魔法】</text>

  <!-- Card art area -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="url(#forestBg)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Forest canopy background -->
  <rect x="26" y="84" width="368" height="280" fill="url(#forestBg)" rx="1"/>
  <!-- Tree silhouettes -->
  <g opacity="0.6">
    <!-- Left tree -->
    <rect x="50" y="200" width="18" height="164" fill="#1B5E20" rx="3"/>
    <ellipse cx="59" cy="190" rx="40" ry="50" fill="#228B22" opacity="0.7"/>
    <ellipse cx="59" cy="175" rx="30" ry="40" fill="#2ECC71" opacity="0.5"/>
    <!-- Right tree -->
    <rect x="340" y="210" width="16" height="154" fill="#1B5E20" rx="3"/>
    <ellipse cx="348" cy="200" rx="38" ry="48" fill="#228B22" opacity="0.7"/>
    <ellipse cx="348" cy="185" rx="28" ry="38" fill="#2ECC71" opacity="0.5"/>
    <!-- Center back tree -->
    <rect x="195" y="160" width="20" height="204" fill="#1B5E20" rx="3" opacity="0.4"/>
    <ellipse cx="205" cy="150" rx="45" ry="55" fill="#228B22" opacity="0.3"/>
  </g>
  <!-- Barrier dome -->
  <g filter="url(#softGlow)">
    <ellipse cx="210" cy="280" rx="150" ry="100" fill="none" stroke="#A8E6CF" stroke-width="2" opacity="0.6"/>
    <ellipse cx="210" cy="280" rx="140" ry="93" fill="none" stroke="#2ECC71" stroke-width="1" opacity="0.4"/>
    <path d="M60,280 Q130,140 210,130 Q290,140 360,280" fill="none" stroke="#A8E6CF" stroke-width="1.5" opacity="0.5"/>
  </g>
  <!-- Barrier glow overlay -->
  <ellipse cx="210" cy="250" rx="150" ry="120" fill="url(#barrierGlow)"/>
  <!-- Ground rune circle -->
  <ellipse cx="210" cy="330" rx="80" ry="20" fill="none" stroke="#DAA520" stroke-width="1" opacity="0.5"/>
  <ellipse cx="210" cy="330" rx="60" ry="15" fill="none" stroke="#DAA520" stroke-width="0.5" opacity="0.4"/>
  <!-- Floating light particles (life energy) -->
  <g filter="url(#softGlow)">
    <circle cx="130" cy="200" r="3" fill="#DAA520" opacity="0.8"/>
    <circle cx="280" cy="190" r="2.5" fill="#DAA520" opacity="0.7"/>
    <circle cx="180" cy="160" r="2" fill="#A8E6CF" opacity="0.9"/>
    <circle cx="250" cy="170" r="2" fill="#A8E6CF" opacity="0.8"/>
    <circle cx="160" cy="250" r="1.5" fill="#DAA520" opacity="0.6"/>
    <circle cx="260" cy="240" r="1.5" fill="#DAA520" opacity="0.6"/>
    <circle cx="210" cy="200" r="3.5" fill="#F0E68C" opacity="0.7"/>
    <circle cx="190" cy="300" r="2" fill="#A8E6CF" opacity="0.5"/>
    <circle cx="230" cy="280" r="2" fill="#A8E6CF" opacity="0.5"/>
  </g>

  <!-- Type description line -->
  <rect x="24" y="370" width="372" height="24" rx="2" ry="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC', sans-serif" font-size="13" fill="#E0FFE8">【永續魔法】</text>

  <!-- Effect text area -->
  <rect x="24" y="398" width="372" height="172" rx="4" ry="4" fill="url(#textAreaBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">自己的每次準備階段，回復自己500點生</tspan>
    <tspan x="32" y="437">命值。</tspan>
  </text>

  <!-- Card ID -->
  <text x="28" y="588" font-family="'Roboto Mono', monospace" font-size="10" fill="#888888">SPL-003</text>
  <text x="388" y="588" font-family="'Roboto', sans-serif" font-size="10" fill="#888888" text-anchor="end">N</text>
</svg>
