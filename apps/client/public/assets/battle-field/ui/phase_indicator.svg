<svg xmlns="http://www.w3.org/2000/svg" width="600" height="50" viewBox="0 0 600 50">
  <defs>
    <filter id="activeGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#FFD43B" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Connecting line (background) -->
  <line x1="50" y1="20" x2="550" y2="20" stroke="#495057" stroke-width="2"/>
  <!-- Phase nodes (inactive) -->
  <circle cx="50" cy="20" r="6" fill="#495057" stroke="#6C757D" stroke-width="1"/>
  <circle cx="150" cy="20" r="6" fill="#495057" stroke="#6C757D" stroke-width="1"/>
  <circle cx="250" cy="20" r="6" fill="#495057" stroke="#6C757D" stroke-width="1"/>
  <circle cx="350" cy="20" r="6" fill="#495057" stroke="#6C757D" stroke-width="1"/>
  <circle cx="450" cy="20" r="6" fill="#495057" stroke="#6C757D" stroke-width="1"/>
  <circle cx="550" cy="20" r="6" fill="#495057" stroke="#6C757D" stroke-width="1"/>
  <!-- Phase labels -->
  <text x="50" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868E96">DP</text>
  <text x="150" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868E96">SP</text>
  <text x="250" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868E96">MP1</text>
  <text x="350" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868E96">BP</text>
  <text x="450" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868E96">MP2</text>
  <text x="550" y="42" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#868E96">EP</text>
</svg>