<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="20" viewBox="0 0 1920 20">
  <defs>
    <linearGradient id="dividerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="15%" stop-color="#00D4FF" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#FFD43B" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#FF4444" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FF4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Main energy line -->
  <line x1="0" y1="10" x2="1920" y2="10" stroke="url(#dividerGrad)" stroke-width="2" filter="url(#lineGlow)"/>
  <!-- Subtle secondary lines -->
  <line x1="100" y1="7" x2="1820" y2="7" stroke="url(#dividerGrad)" stroke-width="0.5" opacity="0.3"/>
  <line x1="100" y1="13" x2="1820" y2="13" stroke="url(#dividerGrad)" stroke-width="0.5" opacity="0.3"/>
</svg>