<svg xmlns="http://www.w3.org/2000/svg" width="140" height="44" viewBox="0 0 140 44">
  <defs>
    <linearGradient id="btnHover" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#E94560"/>
    </linearGradient>
    <filter id="hoverGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#E94560" flood-opacity="0.25" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="140" height="44" rx="8" ry="8" fill="url(#btnHover)" filter="url(#hoverGlow)"/>
  <rect x="2" y="2" width="136" height="20" rx="7" ry="7" fill="#fff" opacity="0.12"/>
  <polygon points="20,16 28,22 20,28" fill="#fff"/>
  <text x="72" y="27" font-family="sans-serif" font-size="14" font-weight="bold" fill="#fff" text-anchor="middle">下一階段</text>
</svg>