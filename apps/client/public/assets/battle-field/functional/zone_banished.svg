      <stop offset="0%" stop-color="#1A1020"/>
      <stop offset="100%" stop-color="#100818"/>
    </linearGradient>
    <radialGradient id="voidGlow" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#FF6B6B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FF6B6B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="1" y="1" width="86" height="122" rx="4" ry="4" fill="url(#banishFill)" stroke="#3A1030" stroke-width="1.5"/>
  <rect x="1" y="1" width="86" height="122" rx="4" ry="4" fill="url(#voidGlow)"/>
  <!-- Void portal icon -->
  <g transform="translate(44,50)" opacity="0.2" fill="none" stroke="#FF6B6B" stroke-width="1.2">
    <circle r="20"/>
    <circle r="14"/>
    <circle r="8"/>
    <!-- Spiral lines -->
    <path d="M0,-20 Q10,-10 0,0"/>
    <path d="M0,20 Q-10,10 0,0"/>
    <path d="M20,0 Q10,10 0,0"/>
    <path d="M-20,0 Q-10,-10 0,0"/>
  </g>
  <!-- Count badge -->
