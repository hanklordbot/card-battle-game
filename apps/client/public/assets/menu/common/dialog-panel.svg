<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" width="480" height="320">
  <defs>
    <linearGradient id="panelG" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1E3E" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2A1F5E" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Panel body -->
  <rect x="4" y="4" width="472" height="312" rx="16" fill="url(#panelG)" stroke="#8B5CF6" stroke-width="1" stroke-opacity="0.3" filter="url(#shadow)"/>
  <!-- Title bar -->
  <rect x="4" y="4" width="472" height="48" rx="16" fill="#2A1F5E" fill-opacity="0.4"/>
  <rect x="4" y="36" width="472" height="16" fill="#2A1F5E" fill-opacity="0.4"/>
  <!-- Title bar bottom border -->
  <line x1="20" y1="52" x2="460" y2="52" stroke="#8B5CF6" stroke-width="0.5" opacity="0.2"/>
</svg>
