<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Normal -->
  <g id="normal">
    <circle cx="16" cy="16" r="14" fill="transparent"/>
    <line x1="10" y1="10" x2="22" y2="22" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="10" x2="10" y2="22" stroke="#94A3B8" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Hover -->
  <g id="hover" transform="translate(0,40)">
    <circle cx="16" cy="16" r="14" fill="rgba(255,255,255,0.1)"/>
    <line x1="10" y1="10" x2="22" y2="22" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="10" x2="10" y2="22" stroke="#F1F5F9" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Pressed -->
  <g id="pressed" transform="translate(0,80)">
    <circle cx="16" cy="16" r="14" fill="rgba(255,255,255,0.05)"/>
    <line x1="10" y1="10" x2="22" y2="22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
    <line x1="22" y1="10" x2="10" y2="22" stroke="#64748B" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
