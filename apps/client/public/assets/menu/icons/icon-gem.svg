<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="gemG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="0.8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Diamond shape -->
  <polygon points="12,2 22,9 17,22 7,22 2,9" fill="url(#gemG)" stroke="#A78BFA" stroke-width="0.5" filter="url(#gl)"/>
  <!-- Top facet line -->
  <polyline points="2,9 12,12 22,9" fill="none" stroke="#C4B5FD" stroke-width="0.5" opacity="0.6"/>
  <!-- Center lines -->
  <line x1="7" y1="22" x2="12" y2="12" stroke="#C4B5FD" stroke-width="0.4" opacity="0.4"/>
  <line x1="17" y1="22" x2="12" y2="12" stroke="#C4B5FD" stroke-width="0.4" opacity="0.4"/>
  <!-- Top highlight -->
  <polygon points="12,2 7,9 12,7 17,9" fill="#C4B5FD" opacity="0.25"/>
  <!-- Sparkle -->
  <circle cx="9" cy="7" r="0.8" fill="#FFFFFF" opacity="0.5"/>
</svg>
