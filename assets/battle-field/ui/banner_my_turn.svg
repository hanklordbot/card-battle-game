<svg xmlns="http://www.w3.org/2000/svg" width="400" height="100" viewBox="0 0 400 100">
  <defs>
    <linearGradient id="bannerBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0"/>
      <stop offset="20%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#00D4FF" stop-opacity="0.25"/>
      <stop offset="80%" stop-color="#00D4FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feFlood flood-color="#00D4FF" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="400" height="100" fill="url(#bannerBg)"/>
  <!-- Top/bottom accent lines -->
  <line x1="40" y1="15" x2="360" y2="15" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="85" x2="360" y2="85" stroke="#00D4FF" stroke-width="1" opacity="0.4"/>
  <!-- Main text -->
  <text x="200" y="52" text-anchor="middle" font-family="sans-serif" font-size="30" font-weight="bold" fill="#00D4FF" filter="url(#textGlow)">YOUR TURN</text>
  <!-- Sub text -->
  <text x="200" y="72" text-anchor="middle" font-family="sans-serif" font-size="13" fill="#00D4FF" opacity="0.7">我的回合</text>
</svg>