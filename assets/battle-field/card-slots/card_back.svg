<svg xmlns="http://www.w3.org/2000/svg" width="180" height="260" viewBox="0 0 180 260">
  <defs>
    <linearGradient id="cardBackGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A3E"/>
      <stop offset="50%" stop-color="#2D1B69"/>
      <stop offset="100%" stop-color="#1A0A3E"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#FFD43B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFD43B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Card body -->
  <rect x="0" y="0" width="180" height="260" rx="8" ry="8" fill="url(#cardBackGrad)"/>
  <!-- Border -->
  <rect x="3" y="3" width="174" height="254" rx="6" ry="6" fill="none" stroke="#533483" stroke-width="2"/>
  <rect x="8" y="8" width="164" height="244" rx="4" ry="4" fill="none" stroke="#3A2060" stroke-width="1"/>
  <!-- Center glow -->
  <rect x="0" y="0" width="180" height="260" rx="8" ry="8" fill="url(#centerGlow)"/>
  <!-- Decorative pattern - oval frame -->
  <ellipse cx="90" cy="130" rx="50" ry="70" fill="none" stroke="#533483" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="90" cy="130" rx="40" ry="56" fill="none" stroke="#6B44A0" stroke-width="1" opacity="0.4"/>
  <!-- Center diamond -->
  <polygon points="90,70 130,130 90,190 50,130" fill="none" stroke="#FFD43B" stroke-width="1" opacity="0.2"/>
  <polygon points="90,85 118,130 90,175 62,130" fill="none" stroke="#FFD43B" stroke-width="0.5" opacity="0.15"/>
  <!-- Corner ornaments -->
  <g opacity="0.3" fill="none" stroke="#533483" stroke-width="1">
    <path d="M15,15 L35,15 M15,15 L15,35"/>
    <path d="M165,15 L145,15 M165,15 L165,35"/>
    <path d="M15,245 L35,245 M15,245 L15,225"/>
    <path d="M165,245 L145,245 M165,245 L165,225"/>
  </g>
  <!-- Small star in center -->
  <polygon points="90,120 93,127 100,128 95,133 96,140 90,136 84,140 85,133 80,128 87,127" fill="#FFD43B" opacity="0.2"/>
</svg>