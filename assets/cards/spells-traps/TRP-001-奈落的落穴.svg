<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C42878"/>
      <stop offset="50%" stop-color="#9B1B5E"/>
      <stop offset="100%" stop-color="#701045"/>
    </linearGradient>
    <linearGradient id="innerFrameGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D83888"/>
      <stop offset="100%" stop-color="#881050"/>
    </linearGradient>
    <linearGradient id="textAreaBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/>
      <stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <!-- Art: Abyss pit -->
    <radialGradient id="abyssCore" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="50%" stop-color="#0D0D1A"/>
      <stop offset="100%" stop-color="#2C2C2C"/>
    </radialGradient>
    <radialGradient id="redGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF4500" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8B0000" stop-opacity="0"/>
    </radialGradient>
    <filter id="trapGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Card frame -->
  <rect x="0" y="0" width="420" height="610" rx="12" ry="12" fill="url(#cardFrameGrad)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" ry="6" fill="none" stroke="url(#innerFrameGrad)" stroke-width="2"/>

  <!-- Card name -->
  <rect x="20" y="14" width="380" height="40" rx="4" ry="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC', sans-serif" font-weight="bold" font-size="20" fill="#FFFFFF" stroke="#000000" stroke-width="0.8" paint-order="stroke">奈落的落穴</text>

  <!-- Trap type icon -->
  <circle cx="378" cy="34" r="18" fill="#9B1B5E" stroke="#5A0E38" stroke-width="2"/>
  <text x="378" y="30" font-family="sans-serif" font-size="9" fill="#FFFFFF" text-anchor="middle">陷阱</text>
  <text x="378" y="42" font-family="sans-serif" font-size="8" fill="#F0A0C8" text-anchor="middle">通常</text>

  <!-- Sub-type indicator -->
  <rect x="24" y="58" width="372" height="20" rx="2" ry="2" fill="rgba(0,0,0,0.1)"/>
  <text x="390" y="72" font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#FFD0E8" text-anchor="end">【陷阱卡】</text>

  <!-- Card art area -->
  <rect x="24" y="82" width="372" height="284" rx="2" ry="2" fill="#2C2C2C" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Ground surface -->
  <rect x="26" y="84" width="368" height="100" fill="#3A3020" rx="1"/>
  <!-- Cracked ground -->
  <g opacity="0.6">
    <path d="M26,184 L100,170 L130,184" fill="#2C2C2C" stroke="#4A3828" stroke-width="1"/>
    <path d="M130,184 L180,165 L210,175 L240,160 L290,175 L310,184" fill="#2C2C2C" stroke="#4A3828" stroke-width="1"/>
    <path d="M310,184 L350,172 L394,184" fill="#2C2C2C" stroke="#4A3828" stroke-width="1"/>
  </g>
  <!-- The abyss pit (top-down view) -->
  <ellipse cx="210" cy="240" rx="120" ry="80" fill="url(#abyssCore)"/>
  <!-- Jagged pit edges -->
  <path d="M90,240 Q100,200 120,210 Q140,180 160,205 Q180,185 210,195 Q240,180 260,205 Q280,185 300,210 Q320,195 330,240 Q325,270 310,275 Q290,290 260,280 Q240,295 210,285 Q180,295 160,280 Q140,290 120,275 Q100,270 90,240Z" fill="none" stroke="#4A3828" stroke-width="2"/>
  <!-- Red glow from abyss -->
  <ellipse cx="210" cy="250" rx="80" ry="50" fill="url(#redGlow)"/>
  <!-- Chains and spikes -->
  <g filter="url(#trapGlow)" opacity="0.7">
    <!-- Chain links left -->
    <ellipse cx="120" cy="220" rx="6" ry="8" fill="none" stroke="#8B6914" stroke-width="2"/>
    <ellipse cx="120" cy="235" rx="5" ry="7" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <ellipse cx="118" cy="250" rx="5" ry="7" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <!-- Chain links right -->
    <ellipse cx="300" cy="225" rx="6" ry="8" fill="none" stroke="#8B6914" stroke-width="2"/>
    <ellipse cx="302" cy="240" rx="5" ry="7" fill="none" stroke="#8B6914" stroke-width="1.5"/>
    <ellipse cx="300" cy="255" rx="5" ry="7" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  </g>
  <!-- Spikes at pit edges -->
  <g opacity="0.6">
    <polygon points="150,215 155,195 160,215" fill="#4A3828" stroke="#3A2818" stroke-width="0.5"/>
    <polygon points="180,205 184,188 188,205" fill="#4A3828" stroke="#3A2818" stroke-width="0.5"/>
    <polygon points="230,200 235,183 240,200" fill="#4A3828" stroke="#3A2818" stroke-width="0.5"/>
    <polygon points="260,208 264,190 268,208" fill="#4A3828" stroke="#3A2818" stroke-width="0.5"/>
  </g>
  <!-- Falling silhouette -->
  <g opacity="0.4">
    <ellipse cx="210" cy="255" rx="10" ry="16" fill="#1A1A2E"/>
    <circle cx="210" cy="237" r="6" fill="#1A1A2E"/>
    <line x1="200" y1="245" x2="190" y2="235" stroke="#1A1A2E" stroke-width="2"/>
    <line x1="220" y1="245" x2="230" y2="235" stroke="#1A1A2E" stroke-width="2"/>
  </g>
  <!-- Red energy particles from pit -->
  <g filter="url(#trapGlow)">
    <circle cx="190" cy="230" r="2" fill="#FF4500" opacity="0.6"/>
    <circle cx="230" cy="225" r="1.5" fill="#FF4500" opacity="0.5"/>
    <circle cx="210" cy="215" r="2" fill="#8B0000" opacity="0.4"/>
    <circle cx="175" cy="250" r="1.5" fill="#FF4500" opacity="0.4"/>
    <circle cx="245" cy="245" r="1.5" fill="#FF4500" opacity="0.4"/>
  </g>

  <!-- Type description line -->
  <rect x="24" y="370" width="372" height="24" rx="2" ry="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC', sans-serif" font-size="13" fill="#FFD0E8">【陷阱卡】</text>

  <!-- Effect text area -->
  <rect x="24" y="398" width="372" height="172" rx="4" ry="4" fill="url(#textAreaBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC', sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">對方召喚・反轉召喚攻擊力1500以上的</tspan>
    <tspan x="32" y="437">怪獸時才能發動。那隻怪獸破壞並除</tspan>
    <tspan x="32" y="454">外。</tspan>
  </text>

  <!-- Card ID -->
  <text x="28" y="588" font-family="'Roboto Mono', monospace" font-size="10" fill="#888888">TRP-001</text>
  <text x="388" y="588" font-family="'Roboto', sans-serif" font-size="10" fill="#888888" text-anchor="end">R</text>
</svg>
