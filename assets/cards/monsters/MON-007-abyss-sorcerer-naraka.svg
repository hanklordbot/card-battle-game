<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 610" width="420" height="610">
  <defs>
    <linearGradient id="cardFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E07A3A"/><stop offset="50%" stop-color="#C45C1E"/><stop offset="100%" stop-color="#8E3A0E"/>
    </linearGradient>
    <linearGradient id="innerFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F09050"/><stop offset="100%" stop-color="#B04E14"/>
    </linearGradient>
    <radialGradient id="artBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2D1B4E"/><stop offset="100%" stop-color="#0D0D1A"/>
    </radialGradient>
    <linearGradient id="textBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8F4E8"/><stop offset="100%" stop-color="#F0E8D0"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="420" height="610" rx="12" fill="url(#cardFrame)" stroke="#3A3020" stroke-width="3"/>
  <rect x="12" y="12" width="396" height="586" rx="6" fill="none" stroke="url(#innerFrame)" stroke-width="2"/>
  <rect x="20" y="14" width="380" height="40" rx="4" fill="rgba(0,0,0,0.25)"/>
  <text x="28" y="41" font-family="'Noto Sans TC',sans-serif" font-weight="bold" font-size="18" fill="#FFF" stroke="#000" stroke-width="0.8" paint-order="stroke">深淵魔導師·乃落迦</text>
  <!-- Attribute: Dark -->
  <circle cx="378" cy="34" r="18" fill="#2D1B4E" stroke="#4A0E6B" stroke-width="2"/>
  <path d="M382,20 A12,12 0 1,0 382,48 A8,8 0 1,1 382,20Z" fill="#9B59B6"/>
  <!-- Stars: 7 -->
  <g transform="translate(396,60)">
    <polygon points="-8,-8 -5.5,-3 0,-2.5 -4,1 -3,6.5 -8,4 -13,6.5 -12,1 -16,-2.5 -10.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-26,-8 -23.5,-3 -18,-2.5 -22,1 -21,6.5 -26,4 -31,6.5 -30,1 -34,-2.5 -28.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-44,-8 -41.5,-3 -36,-2.5 -40,1 -39,6.5 -44,4 -49,6.5 -48,1 -52,-2.5 -46.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-62,-8 -59.5,-3 -54,-2.5 -58,1 -57,6.5 -62,4 -67,6.5 -66,1 -70,-2.5 -64.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-80,-8 -77.5,-3 -72,-2.5 -76,1 -75,6.5 -80,4 -85,6.5 -84,1 -88,-2.5 -82.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-98,-8 -95.5,-3 -90,-2.5 -94,1 -93,6.5 -98,4 -103,6.5 -102,1 -106,-2.5 -100.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
    <polygon points="-116,-8 -113.5,-3 -108,-2.5 -112,1 -111,6.5 -116,4 -121,6.5 -120,1 -124,-2.5 -118.5,-3" fill="#FFD700" stroke="#B8860B" stroke-width="0.8"/>
  </g>
  <!-- Card art -->
  <rect x="24" y="82" width="372" height="284" rx="2" fill="url(#artBg)" stroke="#2A2A2A" stroke-width="2"/>
  <!-- Magic circle at bottom -->
  <g transform="translate(210,320)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="100" ry="25" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="80" ry="20" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="5,3"/>
    <ellipse cx="0" cy="0" rx="60" ry="15" fill="none" stroke="#8B5CF6" stroke-width="0.8"/>
  </g>
  <!-- Dark smoke from edges -->
  <g opacity="0.3" fill="#4A2080">
    <ellipse cx="60" cy="340" rx="40" ry="20"/><ellipse cx="360" cy="340" rx="40" ry="20"/>
    <ellipse cx="50" cy="300" rx="25" ry="30"/><ellipse cx="370" cy="300" rx="25" ry="30"/>
  </g>
  <!-- Mage figure (floating above magic circle) -->
  <g transform="translate(210,210)">
    <!-- Rune rings (3 layers rotating) -->
    <g filter="url(#glow)">
      <ellipse cx="0" cy="0" rx="80" ry="20" fill="none" stroke="#8B5CF6" stroke-width="1.5" transform="rotate(-10)"/>
      <ellipse cx="0" cy="0" rx="65" ry="16" fill="none" stroke="#8B5CF6" stroke-width="1" transform="rotate(15)"/>
      <ellipse cx="0" cy="0" rx="50" ry="12" fill="none" stroke="#8B5CF6" stroke-width="0.8" transform="rotate(-25)"/>
    </g>
    <!-- Rune symbols on rings -->
    <g fill="#8B5CF6" font-size="8" font-family="serif" opacity="0.7">
      <text x="-70" y="5" transform="rotate(-10)">◆</text><text x="60" y="5" transform="rotate(-10)">◇</text>
      <text x="-50" y="-10" transform="rotate(15)">✦</text><text x="45" y="10" transform="rotate(15)">✧</text>
    </g>
    <!-- Robes (multi-layer, flowing upward) -->
    <path d="M-25,-15 Q-35,30 -30,70 Q-20,85 0,80 Q20,85 30,70 Q35,30 25,-15Z" fill="#1A1A2E" stroke="#4A2080" stroke-width="1"/>
    <!-- Inner robe -->
    <path d="M-18,-10 Q-22,25 -20,65 Q-10,75 0,72 Q10,75 20,65 Q22,25 18,-10Z" fill="#1A1030"/>
    <!-- Dark red forbidden runes on robe -->
    <g stroke="#8B0000" stroke-width="0.6" fill="none" opacity="0.6">
      <path d="M-10,20 Q0,15 10,20"/><path d="M-8,35 Q0,30 8,35"/><path d="M-6,50 Q0,45 6,50"/>
    </g>
    <!-- Left arm extended -->
    <path d="M-25,-5 L-55,-15 L-58,-10" fill="#1A1A2E" stroke="#4A2080" stroke-width="0.8"/>
    <ellipse cx="-58" cy="-12" rx="5" ry="4" fill="#D4C8B0"/>
    <!-- Right arm holding staff -->
    <path d="M25,-5 L45,-25 L48,-22" fill="#1A1A2E" stroke="#4A2080" stroke-width="0.8"/>
    <!-- Staff -->
    <line x1="45" y1="-25" x2="55" y2="-80" stroke="#F5F0E8" stroke-width="3"/>
    <line x1="45" y1="-25" x2="55" y2="-80" stroke="#8B6914" stroke-width="1.5"/>
    <!-- Skull on staff top -->
    <circle cx="56" cy="-84" r="7" fill="#F5F0E8" stroke="#D4C8B0" stroke-width="0.8"/>
    <circle cx="53" cy="-86" r="2" fill="#8B5CF6" filter="url(#glow)"/>
    <circle cx="59" cy="-86" r="2" fill="#8B5CF6" filter="url(#glow)"/>
    <path d="M54,-80 L56,-78 L58,-80" fill="none" stroke="#D4C8B0" stroke-width="0.5"/>
    <!-- Head -->
    <ellipse cx="0" cy="-30" rx="14" ry="16" fill="#D4C8B0" stroke="#A09880" stroke-width="0.8"/>
    <!-- Third eye tattoo -->
    <ellipse cx="0" cy="-42" rx="3" ry="2" fill="none" stroke="#8B5CF6" stroke-width="1"/>
    <circle cx="0" cy="-42" r="1" fill="#8B5CF6"/>
    <!-- Eyes (pure purple energy, no pupils) -->
    <ellipse cx="-5" cy="-32" rx="4" ry="3" fill="#8B5CF6" filter="url(#glow)"/>
    <ellipse cx="5" cy="-32" rx="4" ry="3" fill="#8B5CF6" filter="url(#glow)"/>
    <!-- Stern expression -->
    <path d="M-4,-24 L4,-24" stroke="#6A5A4A" stroke-width="0.8"/>
    <!-- Hair (long, flowing upward in dark energy) -->
    <path d="M-14,-35 Q-20,-55 -15,-70" fill="none" stroke="#1A1A2E" stroke-width="3"/>
    <path d="M-10,-40 Q-14,-60 -8,-75" fill="none" stroke="#2D1B4E" stroke-width="2"/>
    <path d="M14,-35 Q20,-55 15,-70" fill="none" stroke="#1A1A2E" stroke-width="3"/>
    <path d="M10,-40 Q14,-60 8,-75" fill="none" stroke="#2D1B4E" stroke-width="2"/>
  </g>
  <!-- Type line -->
  <rect x="24" y="370" width="372" height="24" rx="2" fill="rgba(0,0,0,0.15)"/>
  <text x="30" y="387" font-family="'Noto Sans TC',sans-serif" font-size="13" fill="#1A1A1A">【魔法使族／效果】</text>
  <rect x="24" y="398" width="372" height="144" rx="4" fill="url(#textBg)" stroke="#C8B888" stroke-width="1"/>
  <text font-family="'Noto Sans TC',sans-serif" font-size="12" fill="#1A1A1A">
    <tspan x="32" y="420">此卡不能通常召喚。必須解放自己場上</tspan>
    <tspan x="32" dy="17">2隻闇屬性怪獸才能特殊召喚。</tspan>
    <tspan x="32" dy="17">①：一回合一次，可以從對方墓地選擇1</tspan>
    <tspan x="32" dy="17">隻怪獸除外，此卡攻擊力上升該怪獸攻</tspan>
    <tspan x="32" dy="17">擊力的一半。</tspan>
    <tspan x="32" dy="17">②：此卡被破壞時，可以破壞對方場上所</tspan>
    <tspan x="32" dy="17">有魔法/陷阱卡。</tspan>
  </text>
  <text x="28" y="562" font-family="'Roboto Mono',monospace" font-size="10" fill="#888">MON-007</text>
  <text x="388" y="562" font-family="'Roboto',sans-serif" font-weight="bold" font-size="16" fill="#1A1A1A" text-anchor="end">ATK/2500 DEF/2100</text>
  <text x="28" y="592" font-family="'Roboto',sans-serif" font-size="10" fill="#888">SR</text>
</svg>