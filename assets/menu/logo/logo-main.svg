<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D77A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldGradH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="20%" stop-color="#D4A843"/>
      <stop offset="50%" stop-color="#F5D77A"/>
      <stop offset="80%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Wing ornament path -->
    <path id="wingL" d="M0,0 C-15,-8 -35,-5 -55,-15 C-70,-22 -80,-12 -95,-18 C-80,-5 -60,0 -40,2 C-25,3 -10,2 0,0Z" fill="url(#goldGrad)" opacity="0.8"/>
    <path id="wingR" d="M0,0 C15,-8 35,-5 55,-15 C70,-22 80,-12 95,-18 C80,-5 60,0 40,2 C25,3 10,2 0,0Z" fill="url(#goldGrad)" opacity="0.8"/>
  </defs>

  <!-- Wing ornaments -->
  <use href="#wingL" x="142" y="72" transform="scale(1.1)"/>
  <use href="#wingR" x="338" y="72" transform="scale(1.1)"/>

  <!-- Decorative lines -->
  <line x1="50" y1="90" x2="160" y2="90" stroke="url(#goldGradH)" stroke-width="1" opacity="0.6"/>
  <line x1="320" y1="90" x2="430" y2="90" stroke="url(#goldGradH)" stroke-width="1" opacity="0.6"/>
  <circle cx="160" cy="90" r="2" fill="#D4A843" opacity="0.8"/>
  <circle cx="320" cy="90" r="2" fill="#D4A843" opacity="0.8"/>

  <!-- Diamond decorations -->
  <polygon points="46,90 50,86 54,90 50,94" fill="#D4A843" opacity="0.6"/>
  <polygon points="426,90 430,86 434,90 430,94" fill="#D4A843" opacity="0.6"/>

  <!-- Chinese title: 深淵召喚 -->
  <text x="240" y="68" text-anchor="middle" font-family="'Noto Serif TC','SimSun','serif'" font-size="42" font-weight="700" fill="url(#goldGrad)" filter="url(#glowStrong)" letter-spacing="12">深淵召喚</text>

  <!-- English subtitle: ABYSS SUMMON -->
  <text x="240" y="110" text-anchor="middle" font-family="'Cinzel Decorative','Cinzel','Playfair Display','serif'" font-size="22" font-weight="700" fill="url(#goldGrad)" filter="url(#glow)" letter-spacing="6">ABYSS SUMMON</text>

  <!-- Thin decorative underline -->
  <line x1="165" y1="120" x2="315" y2="120" stroke="url(#goldGradH)" stroke-width="0.5" opacity="0.4"/>

  <!-- Small diamond at center bottom -->
  <polygon points="240,126 243,123 246,126 243,129" fill="#D4A843" opacity="0.5"/>
</svg>
