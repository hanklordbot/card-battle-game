<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <defs>
    <linearGradient id="coinG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D77A"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <filter id="gl"><feGaussianBlur stdDeviation="0.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Outer circle -->
  <circle cx="12" cy="12" r="10" fill="url(#coinG)" stroke="#F5D77A" stroke-width="0.5" filter="url(#gl)"/>
  <!-- Inner ring -->
  <circle cx="12" cy="12" r="7.5" fill="none" stroke="#8B6914" stroke-width="0.8" opacity="0.5"/>
  <!-- Dollar/coin symbol -->
  <text x="12" y="16.5" text-anchor="middle" font-family="'Inter','sans-serif'" font-size="11" font-weight="700" fill="#0A0A12" opacity="0.7">$</text>
  <!-- Highlight -->
  <ellipse cx="9" cy="8" rx="3" ry="2" fill="#F5D77A" opacity="0.3" transform="rotate(-20,9,8)"/>
</svg>
